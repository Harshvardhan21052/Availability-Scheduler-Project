# ─────────────────────────────────────────
# Test profile — uses H2 in-memory DB
# Activated automatically for any test class via @ActiveProfiles("test")
# ─────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT — short-lived tokens for tests
app.jwt.secret=dGVzdFNlY3JldEtleUZvckp3dFRlc3RpbmdPbmx5MTIz
app.jwt.expiration-ms=3600000

logging.level.com.scheduler=WARN
logging.level.org.springframework.security=WARN
